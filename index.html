<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年4月聚餐統計</title>
    <style>
        :root { --blue: #1a73e8; --green: #34a853; --gray: #f8f9fa; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #eef2f7; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--blue); margin-bottom: 30px; }
        
        /* 填寫區樣式 */
        .form-section { display: block; }
        .input-box { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }
        .calendar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 30px; }
        .day-box { border: 1px solid #eee; padding: 10px; border-radius: 10px; background: #fff; text-align: center; }
        .date-label { font-weight: bold; color: var(--blue); display: block; margin-bottom: 5px; }
        .slot-check { font-size: 13px; display: block; margin: 5px 0; cursor: pointer; }

        /* 按鈕 */
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit { background: var(--green); color: white; }
        .btn-submit:hover { background: #2d8a46; }

        /* 結果展示區 (人名行事曆) */
        #result-section { display: none; animation: fadeIn 0.8s; }
        .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .result-card { background: var(--gray); padding: 15px; border-radius: 12px; border-left: 5px solid var(--blue); }
        .result-date { font-weight: bold; font-size: 16px; color: #333; }
        .result-people { font-size: 13px; color: #666; margin-top: 8px; line-height: 1.6; }
        .badge { background: #fff; border: 1px solid #ddd; padding: 2px 6px; border-radius: 4px; margin-right: 4px; display: inline-block; margin-bottom: 4px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="container">
    <div id="form-ui" class="form-section">
        <h2>🗳️ 4月聚餐意願調查</h2>
        <input type="text" id="userName" class="input-box" placeholder="您的姓名 (必填)">
        
        <div class="calendar-grid" id="cal-input">
            </div>
        
        <button class="btn btn-submit" id="submitBtn" onclick="submitAndShow()">送出並查看目前統計</button>
    </div>

    <div id="result-section">
        <h2>📊 目前出席名單一覽</h2>
        <div id="loading" style="text-align:center;">讀取最新名單中...</div>
        <div class="result-grid" id="result-display">
            </div>
        <button class="btn" style="margin-top:30px; background:#666; color:#fff;" onclick="location.reload()">重新填寫 / 返回</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzRj8bnq3-XQ0cvIhwr8W4kOo4dsXhIuYTQ6CCoLImqXg0-ClQRiX3tGWxQkVFBWZvzEA/exec'; // 填入部署後的網址

    function init() {
        const cal = document.getElementById('cal-input');
        for(let d=1; d<=30; d++) {
            let date = new Date(2026, 3, d);
            if(date.getDay() !== 0 && date.getDay() !== 6) {
                const box = document.createElement('div');
                box.className = 'day-box';
                box.innerHTML = `
                    <span class="date-label">4 / ${d}</span>
                    <label class="slot-check"><input type="checkbox" class="lunch" checked> 中餐</label>
                    <label class="slot-check"><input type="checkbox" class="dinner" checked> 晚餐</label>
                `;
                cal.appendChild(box);
            }
        }
    }

    async function submitAndShow() {
        const name = document.getElementById('userName').value.trim();
        if(!name) { alert('請填寫姓名'); return; }

        const selected = [];
        document.querySelectorAll('.day-box').forEach(box => {
            const date = box.querySelector('.date-label').innerText;
            if(box.querySelector('.lunch').checked) selected.push({date, slot:'中餐'});
            if(box.querySelector('.dinner').checked) selected.push({date, slot:'晚餐'});
        });

        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerText = '儲存中...';

        try {
            // 1. 存資料
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({name, details: selected}) });
            
            // 2. 切換 UI
            document.getElementById('form-ui').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';

            // 3. 抓取最新統計並渲染
            fetchResults();
        } catch (e) { alert('發生錯誤，請重試'); }
    }

    async function fetchResults() {
        const res = await fetch(scriptURL);
        const data = await res.json();
        const display = document.getElementById('result-display');
        document.getElementById('loading').style.display = 'none';
        
        // 整理資料：按日期時段分組
        const grouped = {};
        data.forEach(item => {
            const key = `${item.date} (${item.slot})`;
            if(!grouped[key]) grouped[key] = [];
            grouped[key].push(item.name);
        });

        // 畫出卡片
        display.innerHTML = '';
        Object.keys(grouped).sort().forEach(key => {
            const card = document.createElement('div');
            card.className = 'result-card';
            const names = grouped[key].map(n => `<span class="badge">${n}</span>`).join('');
            card.innerHTML = `<div class="result-date">${key}</div><div class="result-people">${names}</div>`;
            display.appendChild(card);
        });
    }

    init();
</script>
</body>
</html>
