<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年4月聚餐統計調查</title>
    <style>
        :root { --blue: #1a73e8; --green: #34a853; --gray: #f8f9fa; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: var(--blue); margin-top: 0; }
        .input-box { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }
        
        /* 填寫區行事曆 */
        .calendar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 25px; }
        .day-box { border: 1px solid #eee; padding: 8px; border-radius: 8px; text-align: center; background: #fff; }
        .date-label { font-weight: bold; color: var(--blue); display: block; margin-bottom: 5px; font-size: 14px; }
        .slot-check { font-size: 12px; display: block; margin: 4px 0; cursor: pointer; color: #555; }

        /* 按鈕 */
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-submit { background: var(--green); color: white; }
        .btn-submit:hover { background: #2d8a46; opacity: 0.9; }

        /* 結果看板 */
        #result-section { display: none; margin-top: 20px; }
        .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 20px; }
        .result-card { background: var(--gray); padding: 12px; border-radius: 10px; border-top: 4px solid var(--blue); }
        .result-date { font-weight: bold; font-size: 14px; color: #333; margin-bottom: 8px; }
        .badge { background: #fff; border: 1px solid #ccc; padding: 2px 6px; border-radius: 4px; margin: 2px; display: inline-block; font-size: 12px; color: #444; }
        
        @media (max-width: 600px) { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="container">
    <div id="form-ui">
        <h2>🗳️ 4月聚餐出席調查</h2>
        <input type="text" id="userName" class="input-box" placeholder="請輸入您的姓名 (必填)">
        
        <div class="calendar-grid" id="cal-input">
            </div>
        
        <button class="btn btn-submit" id="submitBtn" onclick="submitAndShow()">送出並查看大家的時間</button>
    </div>

    <div id="result-section">
        <h2>📊 目前出席名單一覽</h2>
        <div id="loading" style="text-align:center; color:#888;">正在抓取最新資料...</div>
        <div class="result-grid" id="result-display"></div>
        <button class="btn" style="margin-top:30px; background:#666; color:#fff;" onclick="location.reload()">返回填寫頁面</button>
    </div>
</div>

<script>
    // 請確認下方這串網址正確
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz82aW2sP2sFCt1ISUQJ3xk6bve9dTPAUOOz7qtOboho5lPbOa909Rr7FYwwj6A4t_M4A/exec';

    function init() {
        const cal = document.getElementById('cal-input');
        for(let d=1; d<=30; d++) {
            let date = new Date(2026, 3, d); // 2026年4月
            if(date.getDay() !== 0 && date.getDay() !== 6) {
                const box = document.createElement('div');
                box.className = 'day-box';
                box.innerHTML = `
                    <span class="date-label">4 / ${d}</span>
                    <label class="slot-check"><input type="checkbox" class="lunch" checked> 中餐</label>
                    <label class="slot-check"><input type="checkbox" class="dinner" checked> 晚餐</label>
                `;
                cal.appendChild(box);
            }
        }
    }

    async function submitAndShow() {
        const name = document.getElementById('userName').value.trim();
        if(!name) { alert('別忘了填寫您的姓名喔！'); return; }

        const selected = [];
        document.querySelectorAll('.day-box').forEach(box => {
            const date = box.querySelector('.date-label').innerText;
            if(box.querySelector('.lunch').checked) selected.push({date, slot:'中餐'});
            if(box.querySelector('.dinner').checked) selected.push({date, slot:'晚餐'});
        });

        if(selected.length === 0) { alert('請至少勾選一個時段！'); return; }

        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerText = '儲存中...稍候轉跳';

        try {
            // 傳送資料
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({name, details: selected}) });
            
            // 成功後切換畫面
            document.getElementById('form-ui').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            
            // 延遲 1 秒抓取資料，給 Google 試算表一點點反應時間
            setTimeout(fetchResults, 1000);
        } catch (e) {
            alert('連線失敗，請檢查網路或確認 Apps Script 權限。');
            document.getElementById('submitBtn').disabled = false;
        }
    }

    async function fetchResults() {
        try {
            const res = await fetch(scriptURL);
            const data = await res.json();
            const display = document.getElementById('result-display');
            document.getElementById('loading').style.display = 'none';
            
            const grouped = {};
            data.forEach(item => {
                const key = `${item.date} (${item.slot})`;
                if(!grouped[key]) grouped[key] = [];
                grouped[key].push(item.name);
            });

            display.innerHTML = '';
            // 排序日期並顯示
            Object.keys(grouped).sort((a,b) => {
                let da = parseInt(a.split('/')[1]);
                let db = parseInt(b.split('/')[1]);
                return da - db;
            }).forEach(key => {
                const card = document.createElement('div');
                card.className = 'result-card';
                const names = grouped[key].map(n => `<span class="badge">${n}</span>`).join('');
                card.innerHTML = `<div class="result-date">${key}</div><div class="result-people">${names}</div>`;
                display.appendChild(card);
            });
        } catch (e) {
            document.getElementById('loading').innerText = '暫時無法讀取名單，請重新整理網頁。';
        }
    }

    init();
</script>
</body>
</html>
