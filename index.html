<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年4月聚餐統計調查</title>
    <style>
        :root { --blue: #1a73e8; --green: #34a853; --gray: #f8f9fa; --text: #3c4043; }
        body { font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: var(--text); }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: var(--blue); margin-top: 0; font-size: 24px; }
        p.subtitle { text-align: center; color: #70757a; margin-top: -10px; margin-bottom: 25px; }

        /* 姓名輸入 */
        .input-box { width: 100%; padding: 15px; border: 2px solid #dadce0; border-radius: 8px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }
        
        /* 💡 模式切換按鈕區塊 - 加強版樣式 */
        .mode-selector { 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 25px; 
            text-align: center; 
            border: 2px dashed var(--blue); /* 虛線框讓它更明顯 */
        }
        .mode-title { font-weight: bold; margin-bottom: 10px; display: block; color: var(--blue); }
        .mode-options { display: flex; justify-content: center; gap: 30px; }
        .mode-label { cursor: pointer; font-size: 16px; display: flex; align-items: center; font-weight: bold; }
        .mode-label input { width: 20px; height: 20px; margin-right: 8px; cursor: pointer; }

        /* 行事曆網格 */
        .calendar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 30px; }
        .day-header { text-align: center; font-weight: bold; padding: 10px; background: #f1f3f4; border-radius: 6px; font-size: 14px; }
        .day-box { border: 1px solid #dadce0; padding: 12px; border-radius: 10px; text-align: center; background: #fff; }
        .date-label { font-weight: bold; color: var(--blue); display: block; margin-bottom: 8px; border-bottom: 1px dotted #dadce0; padding-bottom: 5px; }
        .slot-check { font-size: 14px; display: flex; align-items: center; justify-content: center; margin: 8px 0; cursor: pointer; }
        .slot-check input { margin-right: 8px; width: 16px; height: 16px; }

        /* 按鈕 */
        .btn { width: 100%; padding: 18px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-submit { background: var(--green); color: white; }

        /* 統計結果區 */
        #result-section { display: none; }
        .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 25px; }
        .result-card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #dadce0; border-top: 5px solid var(--blue); }
        .result-date { font-weight: bold; font-size: 16px; text-align: center; margin-bottom: 12px; }
        .time-slot { margin-top: 10px; border-top: 1px solid #f1f3f4; padding-top: 8px; }
        .time-label { font-size: 12px; font-weight: bold; color: #70757a; display: block; }
        .badge { background: #e8f0fe; color: #1967d2; border: 1px solid #d2e3fc; padding: 3px 8px; border-radius: 12px; margin: 2px; display: inline-block; font-size: 12px; }
        
        @media (max-width: 700px) { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="container">
    <div id="form-ui">
        <h2>📅 2026年4月聚餐調查</h2>
        <p class="subtitle">填寫完畢後，即可查看目前即時彙整的名單</p>
        
        <input type="text" id="userName" class="input-box" placeholder="請填寫您的姓名 (必填)">
        
        <div class="mode-selector">
            <span class="mode-title">快速勾選模式</span>
            <div class="mode-options">
                <label class="mode-label">
                    <input type="radio" name="quickMode" checked onclick="toggleDefault(true)"> 預設全部「可以」
                </label>
                <label class="mode-label">
                    <input type="radio" name="quickMode" onclick="toggleDefault(false)"> 預設全部「不行」
                </label>
            </div>
        </div>

        <div class="calendar-grid" id="cal-input">
            <div class="day-header">一</div><div class="day-header">二</div><div class="day-header">三</div><div class="day-header">四</div><div class="day-header">五</div>
        </div>
        
        <button class="btn btn-submit" id="submitBtn" onclick="submitAndShow()">送出並查看統計結果</button>
    </div>

    <div id="result-section">
        <h2>📊 目前出席統計名單</h2>
        <div id="loading" style="text-align:center; padding: 40px; color:#888;">正在讀取最新資料...</div>
        <div class="result-grid" id="result-display"></div>
        <button class="btn" style="margin-top:40px; background:#5f6368; color:#fff;" onclick="location.reload()">返回 / 重新填寫</button>
    </div>
</div>

<script>
    // ⚠️ 記得換成你的 Apps Script 網址
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz82aW2sP2sFCt1ISUQJ3xk6bve9dTPAUOOz7qtOboho5lPbOa909Rr7FYwwj6A4t_M4A/exec';

    function init() {
        const cal = document.getElementById('cal-input');
        for(let i=0; i<2; i++) { cal.appendChild(document.createElement('div')); }
        for(let d=1; d<=30; d++) {
            let date = new Date(2026, 3, d);
            if(date.getDay() !== 0 && date.getDay() !== 6) {
                const box = document.createElement('div');
                box.className = 'day-box';
                box.innerHTML = `
                    <span class="date-label">4 / ${d}</span>
                    <label class="slot-check"><input type="checkbox" class="slot-cb" data-date="4 / ${d}" data-type="中餐" checked> 中餐</label>
                    <label class="slot-check"><input type="checkbox" class="slot-cb" data-date="4 / ${d}" data-type="晚餐" checked> 晚餐</label>
                `;
                cal.appendChild(box);
            }
        }
    }

    // 💡 模式切換邏輯
    function toggleDefault(isAvailable) {
        document.querySelectorAll('.slot-cb').forEach(cb => cb.checked = isAvailable);
    }

    async function submitAndShow() {
        const nameInput = document.getElementById('userName');
        const name = nameInput.value.trim();
        if(!name) { alert('請輸入您的姓名！'); nameInput.focus(); return; }

        const selected = [];
        document.querySelectorAll('.slot-cb:checked').forEach(cb => {
            selected.push({ date: cb.getAttribute('data-date'), slot: cb.getAttribute('data-type') });
        });

        if(selected.length === 0) { alert('請至少勾選一個時段！'); return; }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = '正在存入系統...';

        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({name, details: selected}) });
            document.getElementById('form-ui').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            setTimeout(fetchResults, 1200);
        } catch (e) {
            alert('連線失敗，請檢查網路。');
            btn.disabled = false;
        }
    }

    async function fetchResults() {
        try {
            const res = await fetch(scriptURL);
            const data = await res.json();
            const display = document.getElementById('result-display');
            document.getElementById('loading').style.display = 'none';
            
            const grouped = {};
            data.forEach(item => {
                const key = `${item.date}-${item.slot}`;
                if(!grouped[key]) grouped[key] = [];
                grouped[key].push(item.name);
            });

            display.innerHTML = '';
            for (let d = 1; d <= 30; d++) {
                let dateObj = new Date(2026, 3, d);
                if (dateObj.getDay() !== 0 && dateObj.getDay() !== 6) {
                    const dateStr = `4 / ${d}`;
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    
                    const getNamesBadge = (slot) => {
                        const key = `${dateStr}-${slot}`;
                        return (grouped[key] || []).map(n => `<span class="badge">${n}</span>`).join('') || '<span style="color:#bdc1c6; font-size:11px;">(無人)</span>';
                    };

                    card.innerHTML = `
                        <div class="result-date">📅 ${dateStr}</div>
                        <div class="time-slot"><span class="time-label">☀️ 中餐</span>${getNamesBadge('中餐')}</div>
                        <div class="time-slot"><span class="time-label">🌙 晚餐</span>${getNamesBadge('晚餐')}</div>
                    `;
                    display.appendChild(card);
                }
            }
        } catch (e) {
            document.getElementById('loading').innerText = '讀取失敗，請重新整理。';
        }
    }

    init();
</script>
</body>
</html>
