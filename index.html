<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年4月平日聚餐統計</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: 20px auto; padding: 10px; background-color: #f8f9fa; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .mode-selector { background: #f1f3f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #007bff; }
        .calendar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 15px; }
        .day-header { text-align: center; font-weight: bold; padding: 10px; background: #e9ecef; border-radius: 4px; }
        .day-cell { border: 1px solid #dee2e6; padding: 10px; border-radius: 8px; background: #fff; }
        .date-num { font-weight: bold; color: #007bff; border-bottom: 1px solid #eee; display: block; margin-bottom: 8px; padding-bottom: 4px; }
        .slot { display: block; cursor: pointer; font-size: 14px; margin: 8px 0; color: #555; }
        .slot input { margin-right: 8px; transform: scale(1.2); }
        .submit-btn { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .submit-btn:hover { background: #218838; transform: translateY(-2px); }
        @media (max-width: 600px) { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="card">
    <h2>📅 2026年4月 聚餐出席統計表</h2>
    
    <div class="form-group">
        <label for="userName">您的姓名</label>
        <input type="text" id="userName" placeholder="請輸入姓名 (必填)..." required>
    </div>

    <div class="mode-selector">
        <label>快速填寫模式：</label>
        <input type="radio" name="mode" id="modeAvailable" checked onclick="toggleDefault(true)"> 
        <label for="modeAvailable" style="display:inline; font-weight:normal; margin-right:20px;"> 預設「可出席」</label>
        <input type="radio" name="mode" id="modeUnavailable" onclick="toggleDefault(false)"> 
        <label for="modeUnavailable" style="display:inline; font-weight:normal;"> 預設「不方便」</label>
    </div>

    <div class="calendar-grid" id="calendar">
        <div class="day-header">週一</div><div class="day-header">週二</div>
        <div class="day-header">週三</div><div class="day-header">週四</div>
        <div class="day-header">週五</div>
    </div>

    <button class="submit-btn" id="btnSubmit" onclick="submitData()">確認送出統計結果</button>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx8YchBtd5NS1PTFBeONMUN6zbnUa0LWvv1qvyPBxjdHoEkbmhND0RStdQTTMVp9EjOwA/exec'; // <--- 請務必換成你的網址
    const daysInApril = 30;
    
    function initCalendar() {
        const calendar = document.getElementById('calendar');
        // 2026年4月1日是週三，前面補兩個空格(週一週二)
        for(let i=0; i<2; i++) { calendar.appendChild(document.createElement('div')); }

        for (let d = 1; d <= daysInApril; d++) {
            let date = new Date(2026, 3, d);
            let dayOfWeek = date.getDay();
            if (dayOfWeek !== 0 && dayOfWeek !== 6) { // 排除假日
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.innerHTML = `
                    <span class="date-num">4 / ${d}</span>
                    <label class="slot"><input type="checkbox" class="lunch" data-date="4/${d}" checked> 中餐</label>
                    <label class="slot"><input type="checkbox" class="dinner" data-date="4/${d}" checked> 晚餐</label>
                `;
                calendar.appendChild(cell);
            }
        }
    }

    function toggleDefault(isAvailable) {
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = isAvailable);
    }

    async function submitData() {
        const name = document.getElementById('userName').value.trim();
        if (!name) { alert('請填入您的姓名！'); return; }

        const selectedSlots = [];
        document.querySelectorAll('.day-cell').forEach(cell => {
            const dateStr = cell.querySelector('.date-num').innerText;
            const lunchChecked = cell.querySelector('.lunch').checked;
            const dinnerChecked = cell.querySelector('.dinner').checked;
            
            if(lunchChecked) selectedSlots.push({ date: dateStr, slot: '中餐' });
            if(dinnerChecked) selectedSlots.push({ date: dateStr, slot: '晚餐' });
        });

        if (selectedSlots.length === 0) { alert('請至少勾選一個可出席的時間！'); return; }

        const btn = document.getElementById('btnSubmit');
        btn.innerText = '傳送中...';
        btn.disabled = true;

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // 解決跨網域問題
                cache: 'no-cache',
                body: JSON.stringify({ name: name, details: selectedSlots })
            });
            alert('提交成功！請關閉網頁即可。');
            window.location.reload(); // 成功後重新整理
        } catch (error) {
            console.error('Error!', error.message);
            alert('提交失敗，請檢查網路連線。');
            btn.innerText = '確認送出統計結果';
            btn.disabled = false;
        }
    }

    initCalendar();
</script>

</body>
</html>
